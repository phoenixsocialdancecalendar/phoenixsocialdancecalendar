        renderLegend(events);

        setViewMode(activeViewMode);
        updatePeriodNavigation(events);

        if (activeViewMode === "map") {
          if (calendarGrid) {
            calendarGrid.innerHTML = "";
          }
          if (calendarWeek) {
            calendarWeek.innerHTML = "";
          }

          renderMapView(events);
          updateUrlState(events);
          return;
        }

        if (activeViewMode === "today") {
          const today = startOfDay(new Date());
          const tomorrow = new Date(today);
          tomorrow.setDate(tomorrow.getDate() + 1);
          const todayEvents = eventsForDay(keyForDate(today), events);
          const tomorrowEvents = eventsForDay(keyForDate(tomorrow), events);
          const spotlightTotal = todayEvents.length + tomorrowEvents.length;

          calendarTitle.textContent = "Today & Tomorrow";
          if (calendarSubtitle) {
            calendarSubtitle.textContent = spotlightTotal
              ? `${spotlightTotal} event${spotlightTotal === 1 ? "" : "s"} across the next two days, ${events.length} total matching the active filters.`
              : "No events match the active filters for today or tomorrow.";
          }

          if (calendarGrid) {
            calendarGrid.innerHTML = "";
          }
          if (calendarWeek) {
            calendarWeek.innerHTML = "";
          }

          syncTodayTomorrowSelection(events);
          renderAgenda(events);
          updateUrlState(events);
          return;
        }

        if (activeViewMode === "week") {
          const currentWeekEvents = events.filter((event) => weekKey(event.startDate) === keyForDate(weekCursor));
          calendarTitle.textContent = formatWeekRange(weekCursor);
          if (calendarSubtitle) {
            calendarSubtitle.textContent = !events.length
              ? "No events match the active filters right now."
              : `${currentWeekEvents.length} event${currentWeekEvents.length === 1 ? "" : "s"} in this week, ${events.length} total matching the active filters.`;
          }
          calendarGrid.innerHTML = "";
          renderWeek(events, weekCursor);
          updateUrlState(events);
          return;
        }

        const monthStart = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), 1);
        const currentMonthEvents = events.filter((event) => monthKey(event.startDate) === monthKey(monthStart));

        calendarTitle.textContent = formatter.monthLabel.format(monthStart);
        if (calendarSubtitle) {
          const summary = !events.length
            ? "No events match the active filters right now."
            : `${currentMonthEvents.length} event${currentMonthEvents.length === 1 ? "" : "s"} this month, ${events.length} total matching the active filters.`;
          calendarSubtitle.textContent = isSameMonth(monthStart, new Date())
            ? `${summary} Showing from this week forward.`
            : summary;
        }

        if (calendarWeek) {
          calendarWeek.innerHTML = "";
        }
        renderMonth(events, monthStart);
        updateUrlState(events);
      }

      function shiftMonth(direction) {
        const next = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + direction, 1);
        const months = availableMonths();
        const key = `${next.getFullYear()}-${next.getMonth()}`;
        if (months.includes(key)) {
          monthCursor = next;
          selectDay("");
          renderCalendar();
        }
      }

      function shiftWeek(direction) {
        const next = new Date(weekCursor);
        next.setDate(next.getDate() + (direction * 7));
        const weeks = availableWeeks();
        const key = keyForDate(next);
        if (weeks.includes(key)) {
          weekCursor = next;
          selectDay("");
          renderCalendar();
        }
      }

      function shiftPeriod(direction) {
        if (activeViewMode === "week") {
          shiftWeek(direction);
          return;
        }
        if (activeViewMode === "today" || activeViewMode === "map") {
          return;
        }
        shiftMonth(direction);
      }

      function jumpToToday() {
        const today = new Date();
        const events = filteredEvents();
        const hasCurrentPeriodEvent = activeViewMode === "map"
          ? events.some((event) => keyForDate(event.startDate) === keyForDate(today))
          : activeViewMode === "today"
          ? events.some((event) => {
              const dayKey = keyForDate(event.startDate);
              const todayKey = keyForDate(today);
              const tomorrow = new Date(today);
              tomorrow.setDate(tomorrow.getDate() + 1);
              return dayKey === todayKey || dayKey === keyForDate(tomorrow);
            })
          : activeViewMode === "week"
            ? events.some((event) => weekKey(event.startDate) === weekKey(today))
            : events.some((event) => event.startDate.getFullYear() === today.getFullYear() && event.startDate.getMonth() === today.getMonth());

        if (activeViewMode === "map") {
          activeMapRange = "today";
          selectedMapLocationKey = "";
          renderMapRangeFilters();
        }

        if (hasCurrentPeriodEvent) {
          const todayKey = keyForDate(today);
          const tomorrow = new Date(today);
          tomorrow.setDate(tomorrow.getDate() + 1);
          const tomorrowKey = keyForDate(tomorrow);
          const nextSelection = eventsForDay(todayKey, events).length
            ? todayKey
            : eventsForDay(tomorrowKey, events).length
              ? tomorrowKey
              : todayKey;
          selectDay(nextSelection, { userInitiated: true });
          renderCalendar();
          return;
        }
        syncMonthCursor();
        syncWeekCursor();
        selectDay("");
        renderCalendar();
      }

      if (sourceFilter) {
        sourceFilter.addEventListener("change", () => {
          syncMonthCursor();
          syncWeekCursor();
          selectDay("");
          renderCalendar();
        });
      }
      if (searchFilter) {
        searchFilter.addEventListener("input", () => {
          activeSearchQuery = searchFilter.value.trim();
          syncMonthCursor();
          syncWeekCursor();
          selectDay("");
          renderCalendar();
        });
      }
      if (cityFilter) {
        cityFilter.addEventListener("change", () => {
          syncMonthCursor();
          syncWeekCursor();
          selectDay("");
          renderCalendar();
        });
      }
      if (resetFiltersButton) {
        resetFiltersButton.addEventListener("click", resetStyleFilters);
      }

      if (prevMonthButton) {
        prevMonthButton.addEventListener("click", () => shiftPeriod(-1));
      }
      if (nextMonthButton) {
        nextMonthButton.addEventListener("click", () => shiftPeriod(1));
      }
      if (todayButton) {
        todayButton.addEventListener("click", jumpToToday);
      }
      if (agendaResizeHandle) {
        agendaResizeHandle.addEventListener("pointerdown", (event) => {
          if (!agendaResizeEnabled()) {
            return;
          }
          event.preventDefault();
          startAgendaResize(event.clientX);
        });
        agendaResizeHandle.addEventListener("keydown", (event) => {
          if (!agendaResizeEnabled()) {
            return;
          }
          if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") {
            return;
          }
          event.preventDefault();
          const delta = event.key === "ArrowLeft" ? 32 : -32;
          const currentWidth = agendaPanel?.getBoundingClientRect().width || AGENDA_PANEL_MIN_WIDTH;
          applyAgendaPanelWidth(currentWidth + delta);
        });
      }

      viewModeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const nextMode = button.dataset.viewMode;
          if (nextMode === activeViewMode) {
            return;
          }
          setViewMode(nextMode, { userInitiated: true });
          renderCalendar();
        });
      });

      if (typeof compactViewQuery.addEventListener === "function") {
        compactViewQuery.addEventListener("change", () => {
          const previousMode = activeViewMode;
          syncViewModeWithViewport();
          if (previousMode !== activeViewMode) {
            renderCalendar();
          }
        });
      } else if (typeof compactViewQuery.addListener === "function") {
        compactViewQuery.addListener(() => {
          const previousMode = activeViewMode;
          syncViewModeWithViewport();
          if (previousMode !== activeViewMode) {
            renderCalendar();
          }
        });
      }

      if (typeof agendaResizeQuery.addEventListener === "function") {
        agendaResizeQuery.addEventListener("change", syncAgendaPanelWidth);
      } else if (typeof agendaResizeQuery.addListener === "function") {
        agendaResizeQuery.addListener(syncAgendaPanelWidth);
      }
      window.addEventListener("resize", syncAgendaPanelWidth);

      if (calendarRoot) {
        applyUrlState();
        syncViewModeWithViewport();
        renderStyleFilters();
        syncAgendaPanelWidth();
        renderCalendar();
      }
    </script>
  </body>
</html>
